<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro Confirmado</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            max-width: 420px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        h1 { color: #22c55e; }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 22px;
            background: #2563eb;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
        }
        a:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="box">
        <h1>✅ Cadastro confirmado!</h1>
        <p>Seu e-mail foi confirmado com sucesso.</p>
        <p>Você já pode fazer login no sistema.</p>
        <a href="/">Ir para o sistema</a>
    </div>
</body>
</html>
