<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard do Aluno</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body onload="verificarLogin()">

<header class="topo">
  <h1>Python em 30 Dias</h1>
  <button onclick="logout()">Sair</button>
</header>

<main>

  <!-- CARROSSEL DOS DIAS -->
  <section class="carrossel-section">
    <h2>📅 Dias do Curso</h2>

    <div class="carrossel-container">
      <button class="nav" onclick="scrollDias(-1)">◀</button>

      <div class="carrossel" id="diasCarrossel">
        <!-- Dias gerados pelo JS -->
      </div>

      <button class="nav" onclick="scrollDias(1)">▶</button>
    </div>
  </section>

  <!-- ESPAÇO VISUAL -->
  <div class="separador"></div>

  <!-- VÍDEOS -->
  <section class="videos-section">
    <h2>🎥 Vídeos da Aula</h2>

    <div class="videos" id="videosContainer">
      <p>Selecione um dia para ver os vídeos.</p>
    </div>
  </section>

</main>

<script src="js/dashboard.js"></script>
</body>
</html>
