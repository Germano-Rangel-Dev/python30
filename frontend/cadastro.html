<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Criar Conta | Python em 30 Dias</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/auth.css">
</head>

<body>

<div class="auth-container">
  <div class="auth-card">

    <h1>🚀 Criar Conta</h1>
    <p>Comece agora sua jornada em Python</p>

    <form onsubmit="criarConta(event)">
      <input type="text" id="nome" placeholder="Nome completo" required />
      <input type="email" id="email" placeholder="E-mail" required />
      <input type="password" id="senha" placeholder="Senha" required />
      <input type="password" id="confirmarSenha" placeholder="Confirmar senha" required />

      <button type="submit">Criar Conta</button>
    </form>

    <p class="erro" id="erroMsg"></p>

    <div class="links">
      <a href="login.html">Já tenho conta</a>
    </div>

  </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
